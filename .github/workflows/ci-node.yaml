name: CI

on:
  push:
    branches:
      - develop
    paths:
      - src/**
      # - package.json
      - .node-version
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Install dependencies
        run: |
              npm install
      - name: Build
        run: |
              npm run build
      - name: Test
        run: |
              npm run test

  tag:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump version
        run: |
              npm version patch
      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
              git config user.name "GitHub Actions"
              git config user.email "actions@github.com"
              git push origin --tags
      # - name: Get latest tag
      #   id: latest_tag
      #   uses: anothrNick/github-tag-action@v1
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     TAG_PREFIX: 'v'
      #     DEFAULT_BUMP: patch
      #     DRY_RUN: true
      # - name: Replace version in package.json
      #   run: |
      #         echo "Bumping version to ${{ steps.latest_tag.outputs.tag }}"
      #         jq '.version = "${{ steps.latest_tag.outputs.tag }}"' package.json > tmp.json
      #         mv tmp.json package.json
      # - name: Bump version and push tag
      #   uses: anothrNick/github-tag-action@v1
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     TAG_PREFIX: ''
      #     DEFAULT_BUMP: patch

  publish:
    needs: [tag]
    runs-on: ubuntu-latest
    concurrency: publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
              npm publish --access public --provenance

  notify:
    needs: [tag]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: horology-web
    steps:
      - uses: juztcode/repo-ditpatch-action@v1
        continue-on-error: true
        with:
          event-type: core-published
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: pilgrimagesoftware/${{ matrix.repo }}
