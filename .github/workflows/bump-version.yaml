name: Bump version

concurrency: ci

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'SemVer component to update'
        type: choice
        options:
          - major
          - minor
          - patch
        required: true

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump version
        run: |
          npm version ${{ github.event.inputs.bump || 'minor' }}
      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git push origin --tags
